services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-narinocultura}
      POSTGRES_USER: ${DB_USER:-narinocultura}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_EDITOR_BASE_URL: http://localhost:5678/
      N8N_SECURE_COOKIE: false
    volumes:
      - n8n_data:/home/node/.n8n

  django:
    build: .
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    command: |
      sh -c "python - <<'PY'
      import socket, time
      host='postgres'
      port=5432
      while True:
          try:
              with socket.create_connection((host, port), timeout=2):
                  break
          except OSError:
              print('Waiting for postgres...')
              time.sleep(1)
      PY
      python manage.py migrate &&
      python -m daphne -b 0.0.0.0 -p 8000 config.asgi:application"

volumes:
  postgres_data:
  n8n_data: