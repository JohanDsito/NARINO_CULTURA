name: narino_cultura
description: Plataforma digital para el ecosistema artístico de Nariño
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  go_router: ^13.0.0

  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  dio: ^5.4.0

  flutter_secure_storage: ^9.0.0

  google_fonts: ^6.2.1

  flutter_svg: ^2.0.9

  cached_network_image: ^3.3.1

  intl: ^0.19.0
  equatable: ^2.0.5

  image_picker: ^1.1.2
  photo_view: ^0.15.0
  share_plus: ^10.0.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
